<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flow2API 稳定性测试台</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #101214;
  --panel: #171b1f;
  --panel-2: #1e2429;
  --field: #0c0f11;
  --line: #2d353b;
  --line-soft: #242b30;
  --text: #edf2f4;
  --muted: #8b979f;
  --muted-2: #66737c;
  --accent: #2dd4bf;
  --accent-strong: #14b8a6;
  --blue: #3b82f6;
  --green: #22c55e;
  --amber: #f59e0b;
  --red: #ef4444;
}
body {
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}
.container { max-width: 1280px; margin: 0 auto; padding: 18px; }
h1 { margin-bottom: 4px; font-size: 22px; color: var(--text); font-weight: 750; letter-spacing: 0; }
.subtitle { color: var(--muted); margin-bottom: 18px; font-size: 13px; }

.config-bar {
  display: grid; grid-template-columns: auto minmax(180px, 1fr) auto minmax(180px, 1fr);
  gap: 10px; margin-bottom: 8px; align-items: center;
  background: var(--panel); padding: 12px 14px; border-radius: 8px; border: 1px solid var(--line);
}
.config-bar label { font-size: 12px; color: var(--muted); white-space: nowrap; font-weight: 650; }
.config-bar input {
  min-width: 0; background: var(--field); border: 1px solid var(--line); color: var(--text);
  padding: 9px 11px; border-radius: 6px; font-size: 13px;
}
.config-note {
  margin-bottom: 18px; font-size: 12px; color: var(--muted-2);
  border-left: 3px solid var(--accent); padding-left: 10px;
}

.main-layout { display: flex; gap: 20px; }
.sidebar { width: 300px; flex-shrink: 0; }
.content { flex: 1; min-width: 0; }

.model-section { margin-bottom: 10px; }
.section-title {
  font-size: 12px; font-weight: 750; color: var(--accent); padding: 9px 11px;
  background: var(--panel-2); border-radius: 8px 8px 0 0; border: 1px solid var(--line); border-bottom: none;
  cursor: pointer; user-select: none; display: flex; justify-content: space-between; align-items: center;
}
.section-title:hover { background: #222a30; }
.section-title .arrow { transition: transform 0.2s; }
.section-title.collapsed .arrow { transform: rotate(-90deg); }
.model-list {
  background: var(--panel); border: 1px solid var(--line); border-radius: 0 0 8px 8px;
  max-height: 270px; overflow-y: auto;
}
.model-list.hidden { display: none; }
.model-item {
  padding: 9px 11px; font-size: 12px; cursor: pointer; border-bottom: 1px solid var(--line-soft);
  display: flex; justify-content: space-between; align-items: center; gap: 10px;
}
.model-item:last-child { border-bottom: none; }
.model-item:hover { background: #20262b; }
.model-item.active { background: #12332f; color: #5eead4; box-shadow: inset 3px 0 0 var(--accent); }
.model-tag {
  font-size: 10px; padding: 3px 6px; border-radius: 999px; font-weight: 750; flex-shrink: 0;
}
.tag-image { background: #123524; color: #5ee084; }
.tag-video { background: #3d2b12; color: #fbbf24; }

.gen-panel {
  background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 18px;
}
.gen-panel h3 { font-size: 16px; margin-bottom: 4px; color: var(--text); }
.gen-panel .model-info { font-size: 12px; color: var(--muted); margin-bottom: 16px; }

.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; font-weight: 650; }
.form-group textarea {
  width: 100%; background: var(--field); border: 1px solid var(--line); color: var(--text);
  padding: 11px 12px; border-radius: 6px; font-size: 14px; resize: vertical; min-height: 92px;
  font-family: inherit;
}
.form-group textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(45, 212, 191, 0.12); }
.form-group input {
  width: 100%; background: var(--field); border: 1px solid var(--line); color: var(--text);
  padding: 10px 12px; border-radius: 6px; font-size: 14px; font-family: inherit;
}
.form-group input:focus, .config-bar input:focus {
  outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(45, 212, 191, 0.12);
}

.image-upload-area {
  border: 1px dashed #3d4a51; border-radius: 6px; padding: 18px; text-align: center;
  cursor: pointer; transition: border-color 0.2s; position: relative;
}
.image-upload-area:hover { border-color: var(--accent); }
.image-upload-area.has-images { padding: 10px; }
.image-upload-hint { color: var(--muted-2); font-size: 13px; }
.image-preview-list { display: flex; gap: 8px; flex-wrap: wrap; }
.image-preview-item {
  position: relative; width: 80px; height: 80px; border-radius: 6px; overflow: hidden;
}
.image-preview-item img { width: 100%; height: 100%; object-fit: cover; }
.image-preview-item .remove-btn {
  position: absolute; top: 2px; right: 2px; width: 20px; height: 20px;
  background: rgba(0,0,0,0.7); color: #fff; border: none; border-radius: 50%;
  cursor: pointer; font-size: 12px; display: flex; align-items: center; justify-content: center;
}

.btn-generate {
  width: 100%; padding: 12px; background: var(--accent-strong); color: #06201c; border: none;
  border-radius: 6px; font-size: 15px; font-weight: 800; cursor: pointer;
  transition: background 0.2s;
}
.btn-generate:hover { background: #2dd4bf; }
.btn-generate:disabled { background: #334047; color: #91a0a8; cursor: not-allowed; }
.batch-grid {
  display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px; align-items: end;
}
.batch-grid input {
  width: 100%; background: var(--field); border: 1px solid var(--line); color: var(--text);
  padding: 10px 12px; border-radius: 6px; font-size: 14px; font-family: inherit;
}
.batch-actions { display: grid; grid-template-columns: 1fr auto; gap: 10px; margin-top: 10px; }
.btn-secondary, .btn-danger {
  padding: 10px 12px; color: #fff; border: none; border-radius: 6px; font-size: 14px;
  font-weight: 750; cursor: pointer; transition: background 0.2s;
}
.btn-secondary { background: var(--blue); }
.btn-secondary:hover { background: #2563eb; }
.btn-secondary:disabled, .btn-danger:disabled { background: #334047; color: #91a0a8; cursor: not-allowed; }
.btn-danger { background: var(--red); min-width: 84px; }
.btn-danger:hover { background: #dc2626; }
.batch-summary {
  margin-top: 10px; display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 8px;
}
.batch-stat { background: var(--field); border: 1px solid var(--line); border-radius: 6px; padding: 10px; }
.batch-stat .label { color: var(--muted-2); font-size: 11px; margin-bottom: 4px; font-weight: 650; }
.batch-stat .value { color: var(--text); font-size: 18px; font-weight: 800; }
.batch-stat:first-child { border-color: rgba(45, 212, 191, 0.45); }
.batch-stat:first-child .value { color: var(--accent); }
.batch-stat.success .value { color: var(--green); }
.batch-stat.fail .value { color: var(--red); }
.batch-stat.warn .value { color: var(--amber); }

.output-panel {
  background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 18px; margin-top: 16px;
}
.output-panel h3 { font-size: 14px; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; color: var(--text); }
.status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
.status-idle { background: var(--muted-2); }
.status-running { background: var(--amber); animation: pulse 1s infinite; }
.status-done { background: var(--green); }
.status-error { background: var(--red); }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

.output-log {
  background: #090b0c; border: 1px solid var(--line-soft); border-radius: 6px; padding: 12px; font-size: 12px;
  line-height: 1.55; max-height: 320px; overflow-y: auto; white-space: pre-wrap;
  word-break: break-all; color: #b7c2c9; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
}
.output-result { margin-top: 12px; }
.output-result img { max-width: 100%; border-radius: 6px; margin-top: 8px; border: 1px solid var(--line); }
.output-result video { max-width: 100%; border-radius: 6px; margin-top: 8px; border: 1px solid var(--line); }

.model-list::-webkit-scrollbar, .output-log::-webkit-scrollbar { width: 4px; }
.model-list::-webkit-scrollbar-thumb, .output-log::-webkit-scrollbar-thumb { background: #3a464d; border-radius: 2px; }

@media (max-width: 768px) {
  .main-layout { flex-direction: column; }
  .sidebar { width: 100%; }
  .config-bar { grid-template-columns: 1fr; }
  .batch-grid, .batch-summary { grid-template-columns: repeat(2, minmax(0, 1fr)); }
}
</style>
</head>
<body>
<div class="container">
  <h1>Flow2API 稳定性测试台</h1>
  <p class="subtitle">单次生成、批量成功率、耗时和失败响应排查</p>

  <div class="config-bar">
    <label>API Key:</label>
    <input type="password" id="apiKey" placeholder="输入 API Key">
    <label>地址:</label>
    <input type="text" id="baseUrl" placeholder="http://localhost:8000" />
  </div>
  <p class="config-note">未填写 API Key 或模型列表加载失败时，会回退到内置候选模型；实际生成前仍需填写有效 API Key。</p>

  <div class="main-layout">
    <div class="sidebar" id="modelSidebar"></div>
    <div class="content">
      <div class="gen-panel">
        <h3 id="selectedModelName">请选择模型</h3>
        <div class="model-info" id="selectedModelInfo">从左侧列表选择一个模型开始测试</div>

        <div class="form-group">
          <label>提示词 (Prompt)</label>
          <textarea id="promptInput" placeholder="描述你想生成的内容...">一只可爱的橘猫趴在窗台上晒太阳，窗外是樱花盛开的春天</textarea>
        </div>

        <div class="form-group" id="imageUploadGroup" style="display:none;">
          <label>上传图片 <span id="imageLimit" style="color:var(--muted-2);font-size:12px;"></span></label>
          <div class="image-upload-area" id="imageUploadArea">
            <div class="image-upload-hint" id="imageHint">点击或拖拽上传图片</div>
            <div class="image-preview-list" id="imagePreviewList"></div>
          </div>
          <input type="file" id="imageFileInput" accept="image/*" multiple style="display:none;">
        </div>

        <div class="form-group" id="extendGroup" style="display:none;">
          <label>续写源视频 Media ID</label>
          <input type="text" id="extendMediaId" placeholder="例如: a6624a62-xxxx-xxxx-xxxx-xxxxxxxxxxxx">
        </div>

        <button class="btn-generate" id="btnGenerate" disabled>选择模型后开始生成</button>

        <div class="form-group" style="margin-top:14px;">
          <label>批量测试</label>
          <div class="batch-grid">
            <div>
              <label>次数</label>
              <input type="number" id="batchCount" min="1" max="100" value="10">
            </div>
            <div>
              <label>间隔秒</label>
              <input type="number" id="batchDelay" min="0" max="300" value="2">
            </div>
            <div>
              <label>显示结果</label>
              <input type="number" id="batchRenderEvery" min="0" max="100" value="1">
            </div>
          </div>
          <div class="batch-actions">
            <button class="btn-secondary" id="btnBatch" disabled>批量测试成功率</button>
            <button class="btn-danger" id="btnStopBatch" disabled>停止</button>
          </div>
          <div class="batch-summary">
            <div class="batch-stat" id="batchRateCard"><div class="label">成功率</div><div class="value" id="batchRate">-</div></div>
            <div class="batch-stat success"><div class="label">成功</div><div class="value" id="batchSuccess">0</div></div>
            <div class="batch-stat fail"><div class="label">失败</div><div class="value" id="batchFail">0</div></div>
            <div class="batch-stat warn"><div class="label">平均耗时</div><div class="value" id="batchAvg">-</div></div>
          </div>
        </div>
      </div>

      <div class="output-panel">
        <h3><span class="status-dot status-idle" id="statusDot"></span> <span id="statusText">等待中</span></h3>
        <div class="output-log" id="outputLog">准备就绪，选择模型并点击生成按钮开始...</div>
        <div class="output-result" id="outputResult"></div>
      </div>
    </div>
  </div>
</div>

  "veo_3_1_r2v_fast_ultra_relaxed": "Video generation (alias) - supports landscape/portrait via generationConfig",
  "veo_3_1_r2v_fast_landscape_ultra_relaxed": "Video generation - R2V fast ultra relaxed landscape",
  "veo_3_1_r2v_fast_landscape_ultra_4k": "Video upsample alias - generate R2V landscape then upscale to 4K",
  "veo_3_1_r2v_fast_landscape_ultra_1080p": "Video upsample alias - generate R2V landscape then upscale to 1080P",
  "veo_3_1_extend": "Video extend (alias) - pass source media id as extend://VIDEO_MEDIA_ID image_url",
  "veo_3_1_extend_portrait": "Video extend portrait - pass source media id as extend://VIDEO_MEDIA_ID image_url",
};

let ALL_MODELS = {};
const HIDDEN_SIDEBAR_MODELS = new Set([
  "abra_t2v_landscape",
  "abra_t2v_portrait",
]);

function maskSecret(value) {
  if (!value) return "";
  if (value.length <= 8) return `${value.slice(0, 2)}***${value.slice(-2)}`;
  return `${value.slice(0, 6)}...${value.slice(-4)}`;
}

function redactDataUrls(value) {
  if (Array.isArray(value)) return value.map(redactDataUrls);
  if (value && typeof value === "object") {
    const copy = {};
    Object.entries(value).forEach(([key, item]) => {
      copy[key] = redactDataUrls(item);
    });
    return copy;
  }
  if (typeof value === "string" && value.startsWith("data:")) {
    const commaIndex = value.indexOf(",");
    const meta = commaIndex >= 0 ? value.slice(0, commaIndex) : "data:*";
    return `${meta},<base64 ${value.length} chars>`;
  }
  return value;
}

function formatJson(value) {
  return JSON.stringify(value, null, 2);
}

function applyFallbackModels(reason) {
  console.warn("使用内置候选模型列表:", reason);
  ALL_MODELS = { ...FALLBACK_MODELS };
  renderSidebar();
}

async function loadModels() {
  const baseUrl = (document.getElementById("baseUrl").value || "").trim();
  const apiKey = (document.getElementById("apiKey").value || "").trim();
  if (!baseUrl || !apiKey) {
    applyFallbackModels("missing_base_url_or_api_key");
    return;
  }
  try {
    const resp = await fetch(`${baseUrl}/v1/models`, {
      headers: { "Authorization": `Bearer ${apiKey}` }
    });
    if (!resp.ok) {
      throw new Error(`HTTP ${resp.status}`);
    }
    const data = await resp.json();
    const items = Array.isArray(data.data) ? data.data : [];
    if (!items.length) {
      applyFallbackModels("empty_model_catalog");
      return;
    }
    ALL_MODELS = {};
    items.forEach(m => { ALL_MODELS[m.id] = m.description; });
    renderSidebar();
  } catch (e) {
    console.error("加载模型失败:", e);
    applyFallbackModels(e.message || "load_failed");
  }
}

function renderSidebarFallback() {
  applyFallbackModels("legacy_fallback");
}

function getModelType(modelId) {
  if (modelId.includes("image") || modelId.startsWith("imagen")) return "image";
  return "video";
}

function getModelMeta(modelId) {
  // Determine supports_images, min/max from model name patterns
  const isI2V = modelId.includes("i2v");
  const isR2V = modelId.includes("r2v");
  const isInterpolationLite = modelId.includes("interpolation_lite");
  const isI2VLite = modelId.includes("i2v_lite");
  const isExtend = modelId.includes("extend");
  const isImage = getModelType(modelId) === "image";

  if (isImage) return { type: "image", supportsImages: true, minImages: 0, maxImages: 5 };
  if (isInterpolationLite) return { type: "video", supportsImages: true, minImages: 2, maxImages: 2 };
  if (isI2VLite) return { type: "video", supportsImages: true, minImages: 1, maxImages: 1 };
  if (isI2V) return { type: "video", supportsImages: true, minImages: 1, maxImages: 2 };
  if (isR2V) return { type: "video", supportsImages: true, minImages: 0, maxImages: 3 };
  if (isExtend) return { type: "video", supportsImages: false, minImages: 0, maxImages: 0, requiresVideoId: true };
  return { type: "video", supportsImages: false, minImages: 0, maxImages: 0 };
}

function renderSidebar() {
  const sidebar = document.getElementById("modelSidebar");
  sidebar.innerHTML = "";

  const modelIds = Object.keys(ALL_MODELS).filter(modelId => !HIDDEN_SIDEBAR_MODELS.has(modelId)).sort();
  if (modelIds.length === 0) {
    sidebar.innerHTML = '<div class="model-section"><div class="model-list" style="border-radius:8px;"><div class="model-item" style="cursor:default;color:var(--muted);">未获取到可用模型，请检查 API Key 或稍后重试</div></div></div>';
    return;
  }

  for (const [catName, catDef] of Object.entries(MODEL_CATEGORIES)) {
    const models = modelIds.filter(catDef.filter);
    if (models.length === 0) continue;

    const section = document.createElement("div");
    section.className = "model-section";

    const title = document.createElement("div");
    title.className = "section-title collapsed";
    title.innerHTML = `<span>${catName} (${models.length})</span><span class="arrow">▼</span>`;

    const list = document.createElement("div");
    list.className = "model-list hidden";

    models.forEach(modelId => {
      const item = document.createElement("div");
      item.className = "model-item";
      item.dataset.model = modelId;

      const type = getModelType(modelId);
      const shortName = modelId.replace("gemini-3.1-flash-image-", "").replace("gemini-3.0-pro-image-", "").replace("imagen-4.0-generate-preview-", "");
      item.innerHTML = `<span>${shortName}</span><span class="model-tag ${type === 'image' ? 'tag-image' : 'tag-video'}">${type === 'image' ? '图片' : '视频'}</span>`;
      item.onclick = () => selectModel(modelId);
      list.appendChild(item);
    });

    title.onclick = () => {
      title.classList.toggle("collapsed");
      list.classList.toggle("hidden");
    };

    section.appendChild(title);
    section.appendChild(list);
    sidebar.appendChild(section);
  }
}

function selectModel(modelId) {
  STATE.selectedModel = modelId;
  STATE.modelConfig = getModelMeta(modelId);
  STATE.images = [];

  // Update sidebar active state
  document.querySelectorAll(".model-item").forEach(el => {
    el.classList.toggle("active", el.dataset.model === modelId);
  });

  // Update panel
  document.getElementById("selectedModelName").textContent = modelId;
  document.getElementById("selectedModelInfo").textContent = ALL_MODELS[modelId] || "";

  // Show/hide image upload
  const uploadGroup = document.getElementById("imageUploadGroup");
  const extendGroup = document.getElementById("extendGroup");
  const meta = STATE.modelConfig;
  if (meta.supportsImages) {
    uploadGroup.style.display = "block";
    const limitText = meta.type === "image" ? "可选，用于图生图" : `${meta.minImages}-${meta.maxImages}张`;
    document.getElementById("imageLimit").textContent = `(${limitText})`;
  } else {
    uploadGroup.style.display = "none";
  }
  extendGroup.style.display = meta.requiresVideoId ? "block" : "none";
  if (!meta.requiresVideoId) {
    document.getElementById("extendMediaId").value = "";
  }

  // Reset image previews
  document.getElementById("imagePreviewList").innerHTML = "";
  document.getElementById("imageHint").style.display = "block";

  // Enable button
  const btn = document.getElementById("btnGenerate");
  btn.disabled = false;
  btn.textContent = meta.type === "image" ? "🎨 生成图片" : "🎬 生成视频";
  document.getElementById("btnBatch").disabled = false;
}

// Image upload handling
const uploadArea = document.getElementById("imageUploadArea");
const fileInput = document.getElementById("imageFileInput");

uploadArea.onclick = (e) => {
  if (e.target.closest(".remove-btn")) return;
  fileInput.click();
};

uploadArea.ondragover = (e) => { e.preventDefault(); uploadArea.style.borderColor = "var(--accent)"; };
uploadArea.ondragleave = () => { uploadArea.style.borderColor = "#3d4a51"; };
uploadArea.ondrop = (e) => {
  e.preventDefault();
  uploadArea.style.borderColor = "#3d4a51";
  handleFiles(e.dataTransfer.files);
};

fileInput.onchange = () => { handleFiles(fileInput.files); fileInput.value = ""; };

function handleFiles(files) {
  const maxImages = STATE.modelConfig ? STATE.modelConfig.maxImages : 5;
  for (const file of files) {
    if (STATE.images.length >= maxImages) break;
    if (!file.type.startsWith("image/")) continue;

    const reader = new FileReader();
    reader.onload = (e) => {
      STATE.images.push(e.target.result);
      renderImagePreviews();
    };
    reader.readAsDataURL(file);
  }
}

function renderImagePreviews() {
  const list = document.getElementById("imagePreviewList");
  const hint = document.getElementById("imageHint");
  list.innerHTML = "";
  hint.style.display = STATE.images.length ? "none" : "block";

  STATE.images.forEach((dataUrl, idx) => {
    const item = document.createElement("div");
    item.className = "image-preview-item";
    item.innerHTML = `<img src="${dataUrl}" alt="preview"><button class="remove-btn" onclick="removeImage(${idx})">×</button>`;
    list.appendChild(item);
  });
}

function removeImage(idx) {
  STATE.images.splice(idx, 1);
  renderImagePreviews();
}

function collectGenerationRequest() {
  const baseUrl = (document.getElementById("baseUrl").value || "").trim();
  const apiKey = (document.getElementById("apiKey").value || "").trim();
  const prompt = document.getElementById("promptInput").value.trim();
  const extendMediaId = document.getElementById("extendMediaId").value.trim();
  if (!prompt) throw new Error("请输入提示词");
  if (!apiKey) throw new Error("请输入 API Key");
  if (!baseUrl) throw new Error("请输入服务地址");
  const meta = STATE.modelConfig;
  if (meta && STATE.images.length < meta.minImages) {
    throw new Error(`该模型至少需要上传 ${meta.minImages} 张图片`);
  }
  if (meta && meta.requiresVideoId && !extendMediaId) {
    throw new Error("请输入续写源视频 Media ID");
  }

  const content = [];
  content.push({ type: "text", text: prompt });
  STATE.images.forEach(dataUrl => {
    content.push({ type: "image_url", image_url: { url: dataUrl } });
  });
  if (meta && meta.requiresVideoId) {
    content.push({ type: "image_url", image_url: { url: `extend://${extendMediaId}` } });
  }

  const messages = [{ role: "user", content: content.length === 1 ? prompt : content }];

  const url = `${baseUrl}/v1/chat/completions`;
  const headers = { "Authorization": `Bearer ${apiKey}`, "Content-Type": "application/json" };
  const loggedHeaders = { ...headers, Authorization: `Bearer ${maskSecret(apiKey)}` };
  const body = { model: STATE.selectedModel, messages, stream: true };
  return { url, headers, loggedHeaders, body, prompt, model: STATE.selectedModel };
}

async function runGenerationRequest(request, appendLog) {
  const startTime = Date.now();
  let fullContent = "";

  appendLog(`[${new Date().toLocaleTimeString()}] 模型: ${request.model}\n`);
  appendLog(`[${new Date().toLocaleTimeString()}] 提示词: ${request.prompt.substring(0, 100)}${request.prompt.length > 100 ? '...' : ''}\n`);
  appendLog(`[${new Date().toLocaleTimeString()}] 开始请求...\n`);
  appendLog(`\n--- 请求参数 ---\n`);
  appendLog(`URL: ${request.url}\n`);
  appendLog(`Method: POST\n`);
  appendLog(`Headers:\n${formatJson(request.loggedHeaders)}\n`);
  appendLog(`Body:\n${formatJson(redactDataUrls(request.body))}\n`);
  appendLog(`--- 响应 ---\n`);

  const resp = await fetch(request.url, {
    method: "POST",
    headers: request.headers,
    body: JSON.stringify(request.body),
  });

  if (!resp.ok) {
    const errText = await resp.text();
    const responseHeaders = {};
    resp.headers.forEach((value, key) => { responseHeaders[key] = value; });
    appendLog(`Status: HTTP ${resp.status} ${resp.statusText}\n`);
    appendLog(`Response Headers:\n${formatJson(responseHeaders)}\n`);
    appendLog(`Response Body:\n${errText}\n`);
    throw new Error(`HTTP ${resp.status}: ${errText}`);
  }

  const reader = resp.body.getReader();
  const decoder = new TextDecoder();
  let buffer = "";

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;

    buffer += decoder.decode(value, { stream: true });
    const lines = buffer.split("\n");
    buffer = lines.pop() || "";

    for (const line of lines) {
      if (!line.startsWith("data: ")) continue;
      const data = line.slice(6).trim();
      if (data === "[DONE]") continue;

      try {
        const parsed = JSON.parse(data);
        if (parsed.error) {
          appendLog(`\n❌ 错误: ${JSON.stringify(parsed.error)}\n`);
          throw new Error(JSON.stringify(parsed.error));
        }
        const choices = parsed.choices || [];
        if (choices.length > 0) {
          const delta = choices[0].delta || {};
          const content = delta.reasoning_content || delta.content || "";
          if (content) {
            fullContent += content;
            appendLog(content);
          }
        }
      } catch (e) {
        if (e.message && e.message.startsWith("{")) throw e;
      }
    }
  }

  const elapsed = (Date.now() - startTime) / 1000;
  if (!fullContent.trim()) {
    throw new Error("响应为空，未收到生成内容");
  }
  appendLog(`\n\n[${new Date().toLocaleTimeString()}] 完成，耗时 ${elapsed.toFixed(1)}s\n`);
  return { content: fullContent, elapsed };
}

function setRunningState(running, label) {
  const btn = document.getElementById("btnGenerate");
  const batchBtn = document.getElementById("btnBatch");
  btn.disabled = running;
  batchBtn.disabled = running || !STATE.selectedModel;
  btn.textContent = running ? label : (STATE.modelConfig && STATE.modelConfig.type === "image" ? "🎨 生成图片" : "🎬 生成视频");
}

// Generation
document.getElementById("btnGenerate").onclick = generate;
document.getElementById("btnBatch").onclick = runBatchTest;
document.getElementById("btnStopBatch").onclick = () => { STATE.batchStop = true; };

async function generate() {
  if (!STATE.selectedModel || STATE.generating) return;

  let request;
  try {
    request = collectGenerationRequest();
  } catch (e) {
    alert(e.message);
    return;
  }

  STATE.generating = true;
  setRunningState(true, "⏳ 生成中...");

  const dot = document.getElementById("statusDot");
  dot.className = "status-dot status-running";
  document.getElementById("statusText").textContent = "生成中...";
  document.getElementById("outputLog").textContent = "";
  document.getElementById("outputResult").innerHTML = "";

  const log = document.getElementById("outputLog");
  const appendLog = (text) => { log.textContent += text; log.scrollTop = log.scrollHeight; };

  try {
    const result = await runGenerationRequest(request, appendLog);
    renderResult(result.content);
    dot.className = "status-dot status-done";
    document.getElementById("statusText").textContent = `完成 (${result.elapsed.toFixed(1)}s)`;

  } catch (e) {
    appendLog(`\n❌ 请求失败: ${e.message}\n`);
    dot.className = "status-dot status-error";
    document.getElementById("statusText").textContent = "失败";
  } finally {
    STATE.generating = false;
    setRunningState(false);
  }
}

function updateBatchSummary(success, fail, totalElapsed) {
  const done = success + fail;
  const rate = done ? `${((success / done) * 100).toFixed(1)}%` : "-";
  const avg = done ? `${(totalElapsed / done).toFixed(1)}s` : "-";
  const rateCard = document.getElementById("batchRateCard");
  rateCard.classList.remove("success", "fail", "warn");
  if (done > 0) {
    const rateValue = success / done;
    rateCard.classList.add(rateValue >= 0.95 ? "success" : (rateValue >= 0.75 ? "warn" : "fail"));
  }
  document.getElementById("batchRate").textContent = rate;
  document.getElementById("batchSuccess").textContent = String(success);
  document.getElementById("batchFail").textContent = String(fail);
  document.getElementById("batchAvg").textContent = avg;
}

function sleep(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

async function runBatchTest() {
  if (!STATE.selectedModel || STATE.generating) return;

  let request;
  try {
    request = collectGenerationRequest();
  } catch (e) {
    alert(e.message);
    return;
  }

  const count = Math.max(1, Math.min(100, parseInt(document.getElementById("batchCount").value, 10) || 1));
  const delaySeconds = Math.max(0, Math.min(300, parseInt(document.getElementById("batchDelay").value, 10) || 0));
  const renderEvery = Math.max(0, parseInt(document.getElementById("batchRenderEvery").value, 10) || 0);
  let success = 0;
  let fail = 0;
  let totalElapsed = 0;

  STATE.generating = true;
  STATE.batchStop = false;
  setRunningState(true, "⏳ 批量测试中...");
  document.getElementById("btnStopBatch").disabled = false;
  document.getElementById("outputLog").textContent = "";
  document.getElementById("outputResult").innerHTML = "";
  updateBatchSummary(0, 0, 0);

  const dot = document.getElementById("statusDot");
  const log = document.getElementById("outputLog");
  const appendLog = (text) => { log.textContent += text; log.scrollTop = log.scrollHeight; };
  dot.className = "status-dot status-running";

  try {
    appendLog(`[${new Date().toLocaleTimeString()}] 批量测试开始: ${count} 次，间隔 ${delaySeconds}s\n`);
    for (let i = 1; i <= count; i++) {
      if (STATE.batchStop) {
        appendLog(`\n[${new Date().toLocaleTimeString()}] 已手动停止，完成 ${i - 1}/${count} 次\n`);
        break;
      }

      document.getElementById("statusText").textContent = `批量测试 ${i}/${count}`;
      appendLog(`\n========== 第 ${i}/${count} 次 ==========\n`);

      const attemptStart = Date.now();
      try {
        const result = await runGenerationRequest(request, appendLog);
        success += 1;
        totalElapsed += result.elapsed;
        appendLog(`✅ 第 ${i} 次成功，耗时 ${result.elapsed.toFixed(1)}s\n`);
        if (renderEvery > 0 && (i % renderEvery === 0 || i === count)) {
          renderResult(result.content);
        }
      } catch (e) {
        const failElapsed = (Date.now() - attemptStart) / 1000;
        fail += 1;
        totalElapsed += failElapsed;
        appendLog(`❌ 第 ${i} 次失败，耗时 ${failElapsed.toFixed(1)}s: ${e.message}\n`);
      }

      updateBatchSummary(success, fail, totalElapsed);
      if (i < count && !STATE.batchStop && delaySeconds > 0) {
        appendLog(`[${new Date().toLocaleTimeString()}] 等待 ${delaySeconds}s 后继续...\n`);
        await sleep(delaySeconds * 1000);
      }
    }

    const done = success + fail;
    const rate = done ? ((success / done) * 100).toFixed(1) : "0.0";
    appendLog(`\n========== 批量测试完成 ==========\n`);
    appendLog(`总次数: ${done}/${count}\n成功: ${success}\n失败: ${fail}\n成功率: ${rate}%\n平均耗时: ${done ? (totalElapsed / done).toFixed(1) : "-"}s\n`);
    dot.className = fail === 0 && success > 0 ? "status-dot status-done" : "status-dot status-error";
    document.getElementById("statusText").textContent = `批量完成，成功率 ${rate}%`;
  } finally {
    STATE.generating = false;
    STATE.batchStop = false;
    document.getElementById("btnStopBatch").disabled = true;
    setRunningState(false);
  }
}

function renderResult(content) {
  const resultDiv = document.getElementById("outputResult");
  resultDiv.innerHTML = "";

  // Extract markdown images
  const imgRegex = /!\[.*?\]\((.*?)\)/g;
  let match;
  while ((match = imgRegex.exec(content)) !== null) {
    const img = document.createElement("img");
    img.src = match[1];
    img.alt = "生成结果";
    img.loading = "lazy";
    resultDiv.appendChild(img);
  }

  // Extract video tags
  const videoRegex = /<video[^>]+src=['"]([^'"]+)['"]/gi;
  while ((match = videoRegex.exec(content)) !== null) {
    const video = document.createElement("video");
    video.src = match[1];
    video.controls = true;
    video.autoplay = true;
    video.loop = true;
    resultDiv.appendChild(video);
  }

  // If no media found, show raw text
  if (resultDiv.children.length === 0 && content.trim()) {
    const pre = document.createElement("pre");
    pre.style.cssText = "color:var(--muted);font-size:13px;white-space:pre-wrap;word-break:break-all;";
    pre.textContent = content;
    resultDiv.appendChild(pre);
  }
}

// Auto-detect base URL
(function() {
  const baseUrlInput = document.getElementById("baseUrl");
  const apiKeyInput = document.getElementById("apiKey");
  baseUrlInput.value = window.location.origin;
  baseUrlInput.addEventListener("change", loadModels);
  apiKeyInput.addEventListener("change", loadModels);
  loadModels();
})();
</script>
